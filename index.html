<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ShiftNote"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#050a14"/>
<title>ShiftNote · Epic Edition</title>
<style>
:root{
  --bg:#050a14;--surf:#0b1523;--surf2:#101e30;--bd:#172438;
  --ac:#2dd4bf;--ac2:#0c3835;--tx:#dde8f5;--mu:#3a5068;
  --danger:#ef4444;--warn:#f59e0b;--ok:#22c55e;--red:#dc2626;
  --f-mono:'Courier New',monospace;--f-sans:system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);min-height:100%;overscroll-behavior:none;font-family:var(--f-sans);color:var(--tx);}
#app{max-width:480px;margin:0 auto;min-height:100vh;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
input,textarea,select{-webkit-appearance:none;appearance:none;font-family:var(--f-mono);outline:none;}
button{cursor:pointer;font-family:var(--f-mono);}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.5);}50%{box-shadow:0 0 0 14px rgba(220,38,38,0);}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #2dd4bf22;}50%{box-shadow:0 0 40px #2dd4bf55;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

.fade-up{animation:fadeUp .2s ease both;}
.slide-up{animation:slideUp .22s cubic-bezier(.32,0,.67,0) both;}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;}
.rec-active{animation:recPulse 1.4s ease-in-out infinite;}
.log-btn-glow{animation:glow 2.5s ease-in-out infinite;}
.blink{animation:blink 1s ease-in-out infinite;}

/* Layout */
.header{background:var(--surf);border-bottom:1px solid var(--bd);padding:13px 18px 11px;position:sticky;top:0;z-index:100;padding-top:calc(13px + env(safe-area-inset-top));}
.logo{font-family:var(--f-mono);font-size:10px;letter-spacing:.28em;color:var(--ac);text-transform:uppercase;font-weight:700;}
.title{font-family:var(--f-mono);font-size:19px;font-weight:600;color:#edf6ff;margin-top:2px;letter-spacing:-.02em;}
.subtitle{font-family:var(--f-mono);font-size:11px;color:var(--mu);margin-top:2px;}
.page{padding:18px 16px;padding-bottom:calc(18px + env(safe-area-inset-bottom));}

/* Forms */
.lbl{font-family:var(--f-mono);font-size:10px;letter-spacing:.22em;color:var(--ac);text-transform:uppercase;font-weight:700;display:block;margin-bottom:5px;}
.inp{background:#07101f;border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;padding:10px 13px;width:100%;}
.ta{background:#07101f;border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;padding:10px 13px;width:100%;resize:vertical;line-height:1.6;}
.sel{background:#07101f;border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;padding:10px 13px;width:100%;}
.inp:focus,.ta:focus,.sel:focus{border-color:var(--ac);}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb14{margin-bottom:14px;}.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}.mb28{margin-bottom:28px;}

/* Buttons */
.btn{background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;border:none;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:700;letter-spacing:.04em;width:100%;display:block;}
.btn:disabled{opacity:.5;}
.btn-sec{background:var(--surf);color:var(--mu);border:1px solid var(--bd);border-radius:8px;padding:10px 15px;font-size:13px;}
.btn-ghost{background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;}
.btn-danger{background:transparent;color:var(--danger);border:1px solid #3a1010;border-radius:6px;padding:3px 9px;font-size:11px;}
.btn-row{display:flex;gap:8px;}

/* Cards */
.card{background:var(--surf);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;}
.card-body{padding:13px 15px;}
.surf2{background:var(--surf2);border:1px solid var(--bd);border-radius:12px;padding:14px;}

/* Overlay + sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-end;}
.sheet{background:var(--surf);border:1px solid var(--bd);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:480px;margin:0 auto;max-height:94vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom));}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);background:var(--surf);}
.tab{flex:1;padding:10px 4px;background:transparent;border:none;font-family:var(--f-mono);font-size:12px;color:var(--mu);border-bottom:2px solid transparent;display:flex;align-items:center;justify-content:center;gap:5px;transition:color .15s;}
.tab.active{color:var(--ac);border-bottom-color:var(--ac);font-weight:700;}
.tab-badge{background:var(--bd);border-radius:99px;padding:1px 6px;font-size:10px;color:#64748b;}
.tab.active .tab-badge{background:#0d2a2a;color:var(--ac);}

/* Timeline */
.tl-row{display:flex;gap:10px;padding:0 16px 2px;}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0;}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.tl-line{width:1px;flex:1;min-height:22px;margin-top:2px;}
.tl-body{flex:1;padding-bottom:14px;border-bottom:1px solid rgba(23,36,56,.5);}
.tl-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;}
.tl-time{font-family:var(--f-mono);font-size:12px;color:var(--ac);font-weight:700;}
.tl-pill{border-radius:99px;padding:1px 8px;font-size:10px;font-weight:700;letter-spacing:.08em;font-family:var(--f-mono);}
.tl-text{font-size:13px;color:#c5d8ed;line-height:1.55;}

/* Patient card */
.pt-card{background:var(--surf);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;padding:13px 15px;display:flex;gap:12px;align-items:center;}
.pt-room-box{width:44px;height:44px;border-radius:10px;background:#091420;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:13px;font-weight:700;color:var(--ac);flex-shrink:0;}
.pt-info{flex:1;}
.pt-name{font-size:14px;font-weight:600;color:var(--tx);}
.pt-dx{font-size:11px;color:var(--mu);margin-top:1px;}
.pt-meta-row{display:flex;gap:7px;margin-top:4px;flex-wrap:wrap;align-items:center;}
.pt-badge{font-family:var(--f-mono);font-size:10px;border-radius:99px;padding:1px 7px;}
.pt-count{background:#091420;border:1px solid var(--bd);border-radius:99px;padding:2px 9px;font-size:11px;color:var(--ac);font-family:var(--f-mono);}

/* Strip */
.pt-strip{background:#060b14;padding:9px 16px;border-bottom:1px solid var(--bd);display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
.strip-item label{font-size:10px;color:var(--mu);display:block;}
.strip-item span{font-size:13px;}

/* Log button */
.log-btn-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px 14px 18px;background:linear-gradient(to top,var(--bg) 65%,transparent);z-index:50;padding-bottom:calc(18px + env(safe-area-inset-bottom));}
.epic-chips{display:flex;gap:5px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px;}
.epic-chip{background:var(--surf);border:1px solid var(--bd);border-radius:6px;color:var(--ac);font-size:10px;padding:6px 10px;white-space:nowrap;font-family:var(--f-mono);}

/* Log Now modal specifics */
.log-voice-box{background:var(--surf2);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px;position:relative;transition:border-color .2s;}
.log-voice-box.recording{border-color:var(--ac);}
.log-ta{background:transparent;border:none;padding:0;min-height:90px;font-size:15px;line-height:1.65;width:100%;color:var(--tx);resize:none;font-family:var(--f-mono);}
.log-ta:focus{outline:none;}
.rec-indicator{position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:5px;}
.rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);}
.mic-btn{width:100%;padding:15px;border-radius:14px;border:2px solid var(--ac);background:#0c2a28;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;}
.mic-btn.active{border-color:var(--red);background:#2d0a0a;}
.mic-icon{font-size:26px;}
.mic-label{text-align:left;}
.mic-label strong{display:block;font-size:13px;font-weight:700;color:var(--ac);}
.mic-btn.active .mic-label strong{color:var(--red);}
.mic-label small{font-size:10px;color:var(--mu);}

/* Preview card */
.preview-card{background:#04090f;border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:16px;}
.preview-time-row{display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--bd);margin-bottom:14px;}
.preview-time{font-family:var(--f-mono);font-size:14px;color:var(--ac);font-weight:700;}
.preview-time-lbl{font-family:var(--f-mono);font-size:10px;color:var(--mu);}
.room-ok{display:flex;align-items:center;gap:10px;background:#0d2a2a;border:1px solid rgba(45,212,191,.26);border-radius:10px;padding:10px 14px;}
.room-box{width:38px;height:38px;border-radius:8px;background:var(--ac2);display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:13px;font-weight:700;color:var(--ac);flex-shrink:0;}
.room-missing{background:#1a1008;border:1px solid rgba(245,158,11,.26);border-radius:10px;padding:12px;}
.cat-pill-lg{border-radius:99px;padding:5px 14px;font-size:12px;font-weight:700;letter-spacing:.08em;font-family:var(--f-mono);}
.cat-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:130px;overflow-y:auto;margin-top:10px;}
.cat-chip{border-radius:6px;padding:4px 9px;font-size:10px;font-family:var(--f-mono);border:1px solid var(--bd);}
.entry-text-box{background:var(--surf2);border-radius:8px;padding:10px 12px;font-size:13px;color:#c5d8ed;line-height:1.6;border:1px solid var(--bd);}

/* Room picker */
.room-picker{background:var(--surf2);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:14px;}
.room-picker-btn{width:100%;margin-bottom:8px;text-align:left;padding:10px 14px;border-radius:8px;display:flex;gap:10px;align-items:center;background:#07101f;border:1px solid var(--bd);}
.room-picker-btn.selected{border-color:var(--ac);color:var(--ac);}

/* Brain tab */
.brain-drop{background:var(--surf2);border:2px dashed var(--bd);border-radius:16px;padding:36px;text-align:center;}
.brain-img-wrap{background:#030810;border-radius:12px;overflow:hidden;border:1px solid var(--bd);position:relative;max-height:56vh;}
.zoom-btns{position:absolute;bottom:8px;right:8px;display:flex;gap:6px;}
.zoom-btn{width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid var(--bd);color:var(--tx);font-size:18px;display:flex;align-items:center;justify-content:center;}

/* Tasks tab */
.task-row{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:10px 13px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;}
.task-cb{width:20px;height:20px;border-radius:4px;border:1.5px solid;background:transparent;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.task-done{background:#060e07;border:1px solid #1a3a20;border-radius:10px;padding:9px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:center;opacity:.55;}
.task-cb-done{width:20px;height:20px;border-radius:4px;background:var(--ok);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:12px;}
.task-text-done{flex:1;font-size:12px;color:#64748b;text-decoration:line-through;}
.task-alarm-badge{display:inline-flex;align-items:flex-start;gap:3px;background:#2a1e08;border:1px solid rgba(245,158,11,.4);border-radius:8px;padding:3px 8px;font-size:10px;color:var(--warn);font-family:var(--f-mono);margin-top:4px;transition:background .3s,border-color .3s,color .3s;}
.task-alarm-badge.fired{background:#0a2010;border-color:rgba(34,197,94,.4);color:var(--ok);}
@keyframes countdownUrgent{0%,100%{opacity:1;}50%{opacity:.5;}}
.countdown-live.urgent{animation:countdownUrgent 1.2s ease-in-out infinite;}
@keyframes bellRing{0%,100%{transform:rotate(0);}20%{transform:rotate(-15deg);}40%{transform:rotate(15deg);}60%{transform:rotate(-10deg);}80%{transform:rotate(10deg);}}
.bell-ring{display:inline-block;animation:bellRing .6s ease both;}
.notif-banner{position:fixed;top:calc(env(safe-area-inset-top) + 60px);left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#0d2a1a;border:1px solid rgba(34,197,94,.5);border-radius:14px;padding:14px 16px;z-index:999;display:flex;gap:12px;align-items:flex-start;box-shadow:0 8px 32px rgba(0,0,0,.6);}
@keyframes bannerIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.notif-banner{animation:bannerIn .25s ease both;}

/* SmartPhrases */
.phrase-trigger{font-family:var(--f-mono);font-size:11px;color:var(--ac);background:#0c2a28;border:1px solid var(--ac2);border-radius:6px;padding:2px 8px;display:inline-block;}
.phrase-row{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.phrase-row:active{border-color:var(--ac);}
.phrase-label{font-size:13px;color:var(--tx);font-weight:600;margin-bottom:4px;}
.phrase-preview{font-size:11px;color:var(--mu);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.phrase-suggestion-box{background:#0d1e30;border:1px solid var(--ac);border-radius:10px;margin-bottom:10px;overflow:hidden;max-height:200px;overflow-y:auto;}
.phrase-suggestion-item{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--bd);display:flex;gap:10px;align-items:center;}
.phrase-suggestion-item:last-child{border-bottom:none;}
.phrase-suggestion-item:active{background:var(--ac2);}
.dot-highlight{color:var(--ac);font-weight:700;font-family:var(--f-mono);}
.bracket{color:var(--warn);font-weight:700;}
/* Required Documentation tab */
.rd-row{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:10px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;}
.rd-row.done{background:#060e07;border-color:#1a3a20;opacity:.65;}
.rd-cb{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--bd);background:transparent;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.rd-cb.checked{background:var(--ok);border-color:var(--ok);}
.rd-label{font-size:13px;color:var(--tx);line-height:1.4;}
.rd-row.done .rd-label{text-decoration:line-through;color:#64748b;}
.rd-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;}
.rd-freq{font-family:var(--f-mono);font-size:10px;color:var(--mu);background:#07101f;border:1px solid var(--bd);border-radius:99px;padding:1px 7px;}
.rd-time{font-family:var(--f-mono);font-size:10px;color:var(--ok);}
.rd-progress{height:4px;border-radius:99px;background:var(--bd);overflow:hidden;margin-bottom:12px;}
.rd-progress-fill{height:100%;background:linear-gradient(90deg,#0d9488,#22c55e);border-radius:99px;transition:width .4s ease;}
.rd-section-hdr{font-family:var(--f-mono);font-size:10px;letter-spacing:.18em;font-weight:700;margin-bottom:8px;margin-top:14px;}
/* Required Documentation */
.rd-group-label{font-family:var(--f-mono);font-size:10px;letter-spacing:.2em;color:var(--mu);margin:14px 0 6px;text-transform:uppercase;}
.rd-row{background:var(--surf2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;transition:border-color .15s;}
.rd-row.done{background:#060e07;border-color:#1a3a20;}
.rd-cb{width:22px;height:22px;border-radius:5px;border:2px solid;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.rd-cb.done{background:var(--ok);border-color:var(--ok);}
.rd-label{font-size:13px;line-height:1.45;flex:1;}
.rd-done-label{font-size:13px;line-height:1.45;flex:1;text-decoration:line-through;color:#64748b;}
.rd-timestamp{font-family:var(--f-mono);font-size:10px;color:var(--ok);margin-top:3px;}
.rd-required-star{color:var(--danger);font-size:10px;margin-left:2px;vertical-align:super;}
.rd-progress-bar{height:5px;border-radius:99px;background:var(--bd);overflow:hidden;margin-bottom:14px;}
.rd-progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#0d9488,#22c55e);transition:width .4s ease;}
.note-output{background:#030710;border:1px solid var(--bd);border-radius:8px;padding:15px;font-size:12px;font-family:var(--f-mono);color:#94a3b8;white-space:pre-wrap;line-height:1.75;max-height:64vh;overflow-y:auto;}

/* Helpers */
.flex{display:flex;}.gap8{gap:8px;}.gap5{gap:5px;}.ai-c{align-items:center;}.jc-sb{justify-content:space-between;}
.w100{width:100%;}.f1{flex:1;}.f2{flex:2;}
.mt16{margin-top:16px;}.mt10{margin-top:10px;}.mt6{margin-top:6px;}
.empty-state{padding:44px 20px;text-align:center;}
.empty-icon{font-size:38px;margin-bottom:10px;}
.empty-title{color:var(--mu);font-size:14px;font-weight:600;margin-bottom:6px;}
.empty-body{color:#1e3048;font-size:12px;line-height:1.6;}
.divider{height:1px;background:var(--bd);margin:16px 0;}
.install-box{background:var(--surf2);border:1px solid var(--bd);border-radius:12px;padding:15px;margin-top:22px;}
.hint{font-size:11px;color:var(--mu);text-align:center;margin-top:12px;font-family:var(--f-mono);}
.row-between{display:flex;justify-content:space-between;align-items:flex-start;}
.info-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.section-lbl{font-family:var(--f-mono);font-size:10px;letter-spacing:.2em;color:var(--mu);margin-bottom:10px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════
const SHIFTS=['Nights (7P–7A)','Days (7A–7P)','Evenings (3P–11P)','Custom'];
const UNITS=['CVICU','ICU','Step-Down','Med-Surg','ED','OR/PACU','Tele','Other'];
const CATS=[
  {id:'assessment', label:'Assessment',            icon:'🩺',color:'#38bdf8'},
  {id:'neuro',      label:'Neuro',                 icon:'🧠',color:'#a78bfa'},
  {id:'cardiac',    label:'Cardiac/Hemodynamics',  icon:'❤️', color:'#f87171'},
  {id:'resp',       label:'Respiratory',           icon:'🫁',color:'#34d399'},
  {id:'gi_gu',      label:'GI / GU',               icon:'💧',color:'#fbbf24'},
  {id:'medication', label:'Medication Event',      icon:'💊',color:'#fb923c'},
  {id:'procedure',  label:'Procedure/Intervention',icon:'🔧',color:'#60a5fa'},
  {id:'lines_tubes',label:'Lines/Tubes/Drains',    icon:'🧵',color:'#c084fc'},
  {id:'lab',        label:'Critical Lab/Value',    icon:'🧪',color:'#f472b6'},
  {id:'physician',  label:'Provider Notification', icon:'📞',color:'#4ade80'},
  {id:'education',  label:'Patient/Family Educ.',  icon:'📋',color:'#67e8f9'},
  {id:'pain',       label:'Pain / Comfort',        icon:'⚡',color:'#fde68a'},
  {id:'fall_safety',label:'Fall / Safety',         icon:'⚠️',color:'#fca5a5'},
  {id:'transfer',   label:'Transfer / Handoff',    icon:'🔄',color:'#86efac'},
  {id:'other',      label:'Other',                 icon:'📝',color:'#94a3b8'},
];
const CMAP=Object.fromEntries(CATS.map(c=>[c.id,c]));
const EPIC_TYPES={
  nursing_note:'Nursing Note',
  shift_assessment:'Shift Assessment',
  sbar_handoff:'SBAR Handoff',
  progress_note:'Progress Note',
  education_note:'Education Note',
  procedure_note:'Procedure Note',
  transfer_note:'Transfer/Handoff Note',
};

function classify(raw){
  const text=raw.toLowerCase();
  const scores={};
  CATS.forEach(cat=>{
    let s=0;
    (KW[cat.id]||[]).forEach(kw=>{
      if(kw.includes(' ')){if(text.includes(kw))s+=3;}
      else{try{if(new RegExp('\\b'+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(text))s+=2;}catch(e){}}
    });
    if(s)scores[cat.id]=s;
  });
  if(/\b(dr\.?|md|np|pa|physician|attending|resident)\b/i.test(text)&&/\b(notif|called|paged|spoke|discuss|inform|update|aware)\b/i.test(text))scores.physician=(scores.physician||0)+10;
  if(/\b(critical|panic|result|reported|called to)\b/i.test(text)&&/\b(potassium|sodium|glucose|hemoglobin|hgb|inr|troponin|lactate|ph|pco2|wbc|platelet|creatinine|calcium|magnesium|bun)\b/i.test(text))scores.lab=(scores.lab||0)+8;
  if(/\d+\s*(mg|mcg|meq|units?|mL|g\b)/i.test(text))scores.medication=(scores.medication||0)+6;
  if(/\d+\s*\/\s*10/i.test(text)||/pain\s+(score|level|rated|scale)/i.test(text))scores.pain=(scores.pain||0)+8;
  if(/\d{2,3}\s*\/\s*\d{2,3}/.test(text))scores.cardiac=(scores.cardiac||0)+6;
  if(/\d{2,3}\s*%/.test(text)&&/\b(spo2|o2|sat|oxygen)\b/i.test(text))scores.resp=(scores.resp||0)+6;
  if(/\d+\s*m[lL]/i.test(text)&&/\b(urine|uo|foley|output)\b/i.test(text))scores.gi_gu=(scores.gi_gu||0)+7;
  if(/\b(step.?down|transferred to|report given|handoff|discharge)\b/i.test(text))scores.transfer=(scores.transfer||0)+8;
  if(/verbali[sz]ed understanding/i.test(text))scores.education=(scores.education||0)+15;
  if(/\b(central line|picc|a.?line|arterial line|chest tube|drain|dressing change)\b/i.test(text))scores.lines_tubes=(scores.lines_tubes||0)+8;
  if(!Object.keys(scores).length)return'other';
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}
function polish(raw){
  let t=raw.trim();
  if(!t)return t;
  t=t.charAt(0).toUpperCase()+t.slice(1);
  if(!/[.!?]$/.test(t))t+='.';
  [[/\bbp\b/gi,'blood pressure'],[/\bhr\b/gi,'heart rate'],[/\brr\b/gi,'respiratory rate'],[/\bspo2\b/gi,'SpO2'],[/\buo\b/gi,'urine output'],[/\buop\b/gi,'urine output per hour'],[/\btemp\b/gi,'temperature'],[/\bvs\b/gi,'vital signs'],[/\bpts?\b/gi,'patient'],[/\bw\/\b/gi,'with'],[/\bs\/p\b/gi,'status post'],[/\bc\/o\b/gi,'complains of'],[/\bnpo\b/gi,'NPO'],[/\bmd\b/gi,'MD'],[/\bnp\b/gi,'NP'],[/\bpiv\b/gi,'peripheral IV'],[/\bcvc\b/gi,'central venous catheter'],[/\ba-line\b/gi,'arterial line'],[/\bprbc\b/gi,'packed red blood cells'],[/\bffp\b/gi,'fresh frozen plasma'],[/\bn\/v\b/gi,'nausea and vomiting']].forEach(([re,rep])=>{t=t.replace(re,rep);});
  return t;
}
function extractRoom(text){
  const pats=[/\b(?:room|rm\.?)\s*([A-Za-z]?\d+[A-Za-z]?)\b/i,/\bbed\s*([A-Za-z]?\d+[A-Za-z]?)\b/i,/\bpatient\s+in\s+(?:room\s+)?([A-Za-z]?\d+[A-Za-z]?)\b/i,/\bfor\s+(?:room\s+)?([A-Za-z]?\d+[A-Za-z]?)\b/i,/^([A-Za-z]?\d+[A-Za-z]?)[,:\s]/];
  for(const re of pats){const m=text.match(re);if(m)return m[1].toUpperCase();}
  return null;
}
function stripRoom(text){
  return text.replace(/\b(?:room|rm\.?)\s*[A-Za-z]?\d+[A-Za-z]?\b[,:\s]*/gi,'').replace(/\bbed\s*[A-Za-z]?\d+[A-Za-z]?\b[,:\s]*/gi,'').replace(/\bfor\s+(?:room\s+)?[A-Za-z]?\d+[A-Za-z]?\b[,:\s]*/gi,'').replace(/\bpatient\s+in\s+(?:room\s+)?[A-Za-z]?\d+[A-Za-z]?\b[,:\s]*/gi,'').replace(/^[A-Za-z]?\d+[A-Za-z]?[,:\s]+/,'').trim();
}

//  ALARM ENGINE
// ═══════════════════════════════════════════════════════
const ALARMS={};

function notifSupported(){return'Notification'in window;}

async function requestNotifPermission(){
  if(!notifSupported())return false;
  if(Notification.permission==='granted')return true;
  if(Notification.permission==='denied')return false;
  const r=await Notification.requestPermission();
  return r==='granted';
}

function fmtAlarmTime(isoStr){
  if(!isoStr)return'';
  return new Date(isoStr).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true});
}

function fmtCountdown(isoStr){
  if(!isoStr)return'';
  const diff=new Date(isoStr)-Date.now();
  if(diff<=0)return'⚠ NOW';
  const totalMin=Math.floor(diff/60000);
  const hrs=Math.floor(totalMin/60);
  const mins=totalMin%60;
  if(totalMin<1)return'< 1 min';
  if(totalMin<5)return`${totalMin}m ⚡`;
  if(totalMin<60)return`in ${totalMin}m`;
  if(mins===0)return`in ${hrs}h`;
  return`in ${hrs}h ${mins}m`;
}

// Live ticker — updates countdown spans every 30s without full re-render
let TICKER_ID=null;
function startTicker(){
  if(TICKER_ID)clearInterval(TICKER_ID);
  TICKER_ID=setInterval(()=>{
    document.querySelectorAll('[data-alarm-iso]').forEach(el=>{
      const iso=el.dataset.alarmIso;
      if(!iso)return;
      const diff=new Date(iso)-Date.now();
      const countEl=el.querySelector('.countdown-live');
      if(!countEl)return;
      countEl.textContent=fmtCountdown(iso);
      // Toggle urgency class
      countEl.classList.toggle('urgent',diff>0&&diff<300000);
      // Update colors
      if(diff<=0){
        el.style.background='#3a0a0a';el.style.borderColor='rgba(239,68,68,.6)';el.style.color='var(--danger)';
      } else if(diff<300000){
        el.style.background='#3a2a08';el.style.borderColor='rgba(245,158,11,.7)';el.style.color='#fde68a';
      } else {
        el.style.background='#2a1e08';el.style.borderColor='rgba(245,158,11,.4)';el.style.color='var(--warn)';
      }
    });
  },30000);
}

function showAlarmBanner(title,body,taskId){
  const existing=document.getElementById('alarm-banner');
  if(existing)existing.remove();
  const el=document.createElement('div');
  el.id='alarm-banner';el.dataset.tid=taskId;
  el.className='notif-banner';
  el.innerHTML=`<div style="font-size:24px;flex-shrink:0;animation:bellRing .6s ease both">🔔</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:#4ade80;margin-bottom:3px">${title}</div>
      <div style="font-size:12px;color:#94a3b8;line-height:1.4">${body}</div>
    </div>
    <button onclick="this.closest('#alarm-banner').remove()" style="background:transparent;border:none;color:#64748b;font-size:18px;padding:0 4px;cursor:pointer;flex-shrink:0">✕</button>`;
  document.body.appendChild(el);
  setTimeout(()=>{const b=document.getElementById('alarm-banner');if(b&&b.dataset.tid===taskId)b.remove();},30000);
}

function fireAlarm(task,patientRoom){
  APP.pts.forEach(p=>{const t=p.tasks.find(t=>t.id===task.id);if(t)t.alarmFired=true;});
  delete ALARMS[task.id];
  saveState();
  const title=`⏰ Reminder — Room ${patientRoom||'?'}`;
  const body=task.text;
  if(notifSupported()&&Notification.permission==='granted'){
    try{new Notification(title,{body,tag:task.id,requireInteraction:true,vibrate:[300,100,300]});}catch(e){}
  }
  showAlarmBanner(title,body,task.id);
  render();
}

function scheduleAlarm(task,patientRoom){
  if(!task.alarmTime)return;
  cancelAlarm(task.id);
  const delay=new Date(task.alarmTime)-Date.now();
  if(delay<=0)return;
  ALARMS[task.id]=setTimeout(()=>fireAlarm(task,patientRoom),delay);
}

function cancelAlarm(taskId){
  if(ALARMS[taskId]){clearTimeout(ALARMS[taskId]);delete ALARMS[taskId];}
}

function rescheduleAllAlarms(){
  APP.pts.forEach(p=>{
    p.tasks.forEach(t=>{
      if(t.alarmTime&&!t.done&&!t.alarmFired)scheduleAlarm(t,p.room);
    });
  });
}

const allPhrases=()=>[...DEFAULT_PHRASES,...(APP.customPhrases||[])];

function detectDotPhrase(text){
  // Find last word that starts with a dot
  const m=text.match(/\.([a-zA-Z]*)$/);
  if(!m)return{word:'',suggestions:[]};
  const word='.'+m[1].toLowerCase();
  if(word.length<2)return{word,suggestions:[]};
  const suggestions=allPhrases().filter(p=>p.trigger.startsWith(word)).slice(0,5);
  return{word,suggestions};
}

function insertPhrase(phrase){
  // Replace the dot-word in logText with the phrase text
  const dotWord=APP.logDotWord;
  if(dotWord&&APP.logText.endsWith(dotWord)){
    APP.logText=APP.logText.slice(0,-dotWord.length)+phrase.text;
  } else {
    APP.logText=(APP.logText?APP.logText+'\n':'')+phrase.text;
  }
  APP.logPhraseSuggestions=[];APP.logDotWord='';APP.phraseOpen=false;
  // Auto-set category override
  APP.logOverrideCat=null;
  render();
  // Focus textarea
  setTimeout(()=>{const ta=document.getElementById('log-ta');if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},50);
}

const fmt=iso=>iso?new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true}):'';
const fmtDate=iso=>iso?new Date(iso).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}):'';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function generateNote(patient,noteType,nurse){
  const sorted=[...patient.entries].sort((a,b)=>new Date(a.time)-new Date(b.time));
  const pending=patient.tasks.filter(t=>!t.done);
  const line='─'.repeat(60);
  const hdr=[noteType.toUpperCase(),`Patient: ${patient.name||'Unnamed'}  |  Room: ${patient.room||'—'}  |  MRN: ${patient.mrn||'—'}`,`Dx: ${patient.dx||'—'}`,`Date: ${fmtDate(new Date().toISOString())}  |  Shift: ${nurse.shift}  |  Unit: ${nurse.unit}`,`Author: ${nurse.name||'RN'}`,line,''].join('\n');
  if(noteType==='SBAR Handoff'){
    const events=sorted.map(e=>`  ${fmt(e.time)} — [${(CMAP[e.category]?.label||e.category).toUpperCase()}] ${e.text}`).join('\n')||'  No events documented.';
    const tasks=pending.length?pending.map(t=>`  □ ${t.text}`).join('\n'):'  No pending items.';
    return hdr+['[S — SITUATION]','  Patient: '+(patient.name||'Unnamed')+', Rm '+(patient.room||'—')+', MRN: '+(patient.mrn||'—'),'  Dx: '+(patient.dx||'—'),'  Current concern: ___','','[B — BACKGROUND]','  Shift events:',events,'','[A — ASSESSMENT]','  Hemodynamics/VS: ___','  Neuro: ___','  Respiratory: ___','  Lines/drips: ___','','[R — RECOMMENDATION / PENDING]',tasks,'',line,`Signed off: ${new Date().toLocaleString()}  |  ${nurse.name||'RN'}  |  ${nurse.unit}`].join('\n');
  }
  if(!sorted.length)return hdr+'No shift entries documented.';
  const grouped={};
  sorted.forEach(e=>{(grouped[e.category]=grouped[e.category]||[]).push(e);});
  let body='';
  Object.keys(grouped).forEach(cid=>{
    body+=`[${(CMAP[cid]?.label||cid).toUpperCase()}]\n`;
    grouped[cid].forEach(e=>{body+=`  ${fmt(e.time)} — ${e.text}\n`;});
    body+='\n';
  });
  if(pending.length){body+='[PENDING / FOLLOW-UP]\n';pending.forEach(t=>{body+=`  □ ${t.text}\n`;});body+='\n';}
  // Required Documentation status
  const rdItems=patient.reqDocs||[];
  if(rdItems.length){
    const rdDone=rdItems.filter(r=>r.done);
    const rdMissing=rdItems.filter(r=>!r.done&&r.required);
    body+=`[REQUIRED DOCUMENTATION STATUS — ${rdDone.length}/${rdItems.length} COMPLETE]\n`;
    rdDone.forEach(r=>{body+=`  ✓ ${r.label}${r.time?' ('+fmt(r.time)+')':''}\n`;});
    rdMissing.forEach(r=>{body+=`  ⚠ INCOMPLETE: ${r.label}\n`;});
    body+='\n';
  }
  return hdr+body+[line,`Documented: ${new Date().toLocaleString()}`,`Author: ${nurse.name||'RN'}  |  ${nurse.unit}`,'Paste into Epic → Notes → New → Nursing Documentation'].join('\n');
}

// ═══════════════════════════════════════════════════════
//  VOICE RECOGNITION ENGINE  (iOS Safari + Android Chrome)
//
//  Root cause of iOS failure:
//    1. continuous:true is broken on iOS — use false + restart
//    2. Calling render() inside onresult destroys the DOM and
//       kills the active session — update textarea directly instead
//    3. no-speech / aborted errors are normal pauses, not failures
// ═══════════════════════════════════════════════════════
const REC = {
  _inst: null,
  _going: false,
  _accum: '',

  get supported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  },

  start() {
    if (!this.supported) {
      alert(
        'Voice-to-text is not available in this browser.\n\n' +
        '✅ Works in: Safari on iPhone/iPad (iOS 14.5+), Chrome on Android\n' +
        '❌ Does not work in: Chrome/Firefox/Edge on iOS\n\n' +
        'Tip: You can also use your keyboard\u2019s \uD83C\uDF99 microphone key to dictate into the text box.'
      );
      return;
    }
    this._going = true;
    this._accum = APP.logText || '';
    APP.logRec = true;
    this._updateUI(true);
    this._spawn();
  },

  _spawn() {
    if (!this._going) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const inst = new SR();
    this._inst = inst;
    inst.lang = 'en-US';
    inst.continuous = false;
    inst.interimResults = true;
    inst.maxAlternatives = 1;

    inst.onresult = (e) => {
      if (inst !== this._inst) return;
      let finalChunk = '', interimChunk = '';
      Array.from(e.results).forEach(r => {
        if (r.isFinal) finalChunk += r[0].transcript + ' ';
        else interimChunk += r[0].transcript;
      });
      if (finalChunk) {
        this._accum = (this._accum + ' ' + finalChunk).trim();
        APP.logText = this._accum;
      }
      APP.logInterim = interimChunk;
      // Update textarea DIRECTLY — never call render() here
      const ta = document.getElementById('log-ta');
      if (ta) {
        ta.value = this._accum + (interimChunk ? ' ' + interimChunk + '\u2026' : '');
        ta.scrollTop = ta.scrollHeight;
      }
      const btn = document.getElementById('log-process');
      if (btn && this._accum.trim()) btn.disabled = false;
    };

    inst.onend = () => {
      if (inst !== this._inst) return;
      if (this._going) {
        setTimeout(() => this._spawn(), 120);
      } else {
        APP.logRec = false;
        APP.logInterim = '';
        this._updateUI(false);
      }
    };

    inst.onerror = (e) => {
      if (inst !== this._inst) return;
      if (['no-speech','aborted','audio-capture'].includes(e.error)) {
        if (this._going) setTimeout(() => this._spawn(), 120);
        return;
      }
      if (e.error === 'not-allowed') {
        alert('Microphone access was denied.\n\nGo to Settings > Safari > Microphone and allow access, then try again.');
        this.stop(); return;
      }
      if (e.error === 'network') {
        alert('Voice recognition needs a network connection on this device.\n\nTip: Use your keyboard\u2019s \uD83C\uDF99 mic key to dictate offline.');
        this.stop(); return;
      }
      if (this._going) setTimeout(() => this._spawn(), 300);
    };

    try { inst.start(); }
    catch(err) { if (this._going) setTimeout(() => this._spawn(), 250); }
  },

  stop() {
    this._going = false;
    if (APP.logInterim && APP.logInterim.trim()) {
      this._accum = (this._accum + ' ' + APP.logInterim).trim();
      APP.logText = this._accum;
      APP.logInterim = '';
    }
    if (this._inst) {
      try { this._inst.stop(); } catch(e) {}
      this._inst = null;
    }
    APP.logRec = false;
    render();
  },

  _updateUI(on) {
    const btn  = document.getElementById('mic-toggle');
    const dot  = document.getElementById('rec-live-dot');
    const stat = document.getElementById('rec-live-status');
    const box  = document.getElementById('log-voice-box');
    const icon = document.getElementById('mic-icon');
    const lbl  = document.getElementById('mic-label-main');
    const sub  = document.getElementById('mic-label-sub');
    if (btn)  btn.classList.toggle('active', on);
    if (dot)  dot.style.display  = on ? 'flex' : 'none';
    if (stat) stat.style.display = on ? 'flex' : 'none';
    if (box)  box.classList.toggle('recording', on);
    if (icon) icon.textContent = on ? '\u2B1B' : '\uD83C\uDF99';
    if (lbl)  lbl.textContent  = on ? 'Tap to Stop' : 'Tap to Speak';
    if (sub)  sub.textContent  = on ? 'Recording in progress\u2026' : 'Mic off \u2014 tap to start';
  },
};

  const ptask=p.tasks.filter(t=>!t.done).length;
  return`<div class="pt-card" data-ptid="${p.id}" id="ptcard-${p.id}">
    <div class="pt-room-box">${esc(p.room||'?')}</div>

// ──── PATIENT DETAIL ────
function buildPatient(p){
  const timeline=[...p.entries].sort((a,b)=>new Date(a.time)-new Date(b.time));
  const pendingCount=p.tasks.filter(t=>!t.done).length;
  const bImgId=`bimg-${p.id}`;
  const scale=APP.brainScale[p.id]||1;
  const docs=p.reqDocs||[];
  const rdDone=docs.filter(d=>d.done).length;
  const rdTotal=docs.length;
  const rdBadge=rdTotal?`${rdDone}/${rdTotal}`:null;
  const rdUrgent=rdTotal>0&&rdDone<rdTotal;
  return`
    <div class="pt-strip">
      <div class="strip-item"><label>Patient</label><span>${esc(p.name||'—')}</span></div>
      <div class="strip-item"><label>MRN</label><span style="font-family:var(--f-mono)">${esc(p.mrn||'—')}</span></div>
      <div class="strip-item" style="flex:1"><label>Dx</label><span style="font-size:12px;color:#94a3b8">${esc(p.dx||'—')}</span></div>
      <button class="btn-danger" id="remove-pt">✕</button>
    </div>
    <div class="tabs" style="overflow-x:auto">
      ${[
        {id:'timeline', label:'Timeline', badge:timeline.length},
        {id:'brain',    label:'🧠 Brain', badge:p.brainImg?'📷':null},
        {id:'tasks',    label:'Tasks',    badge:pendingCount||null},
        {id:'reqdocs',  label:'Req Docs', badge:rdBadge, urgent:rdUrgent},
      ].map(t=>`
        <button class="tab${APP.tab===t.id?' active':''}" data-tab="${t.id}" style="white-space:nowrap">
          ${t.label}${t.badge!==null&&t.badge!==undefined?`<span class="tab-badge" style="${t.urgent&&APP.tab!==t.id?'background:#2a1800;color:var(--warn);':''}">${t.badge}</span>`:''}
        </button>`).join('')}
    </div>
    ${APP.tab==='timeline'?buildTimeline(p,timeline):''}

    ${APP.tab==='reqdocs'?buildReqDocs(p):''}
    ${APP.tab==='timeline'?buildPatientBottomBar(p):''}
  `;
}

  return`<div style="padding-top:16px">

function buildTasks(p){

  return`<div class="page" style="padding-bottom:80px">

    </div>`:''}
    ${notifStatus==='denied'?`<div style="background:#1a1008;border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:11px;color:#fca5a5">⚠️ Notifications blocked. Alarms will still show as in-app banners. To enable phone alerts, allow notifications in your browser settings.</div>`:''}
    <div class="surf2 mb16">
      <div class="lbl">Add Task / Reminder</div>
      <textarea class="ta mb8" id="task-input" placeholder="e.g. Recheck K+ after replacement · Wound care · Follow up AM labs" rows="2" style="min-height:52px">${esc(APP.taskText)}</textarea>

        <div>
          <div class="lbl" style="margin-bottom:4px">Priority</div>
          <div class="flex gap5">
            ${Object.entries(PRIOS).map(([k,v])=>`<button class="btn-ghost" data-prio="${k}" style="font-size:10px;flex:1;${APP.taskPrio===k?`background:${v.color}22;border-color:${v.color};color:${v.color}`:''}">${v.label}</button>`).join('')}
          </div>
        </div>
        <div>
          <div class="lbl" style="margin-bottom:4px">🔔 Alarm Time</div>
          <input type="time" class="inp" id="task-alarm-inp" value="${esc(APP.taskAlarmTime)}" style="font-size:13px;padding:8px 10px"/>
        </div>
      </div>
      <button class="btn" id="task-add" style="padding:11px 16px;font-size:13px">＋ Add Task</button>
    </div>
    ${pending.length?`<div class="section-lbl">PENDING (${pending.length})</div>${pending.map(t=>buildTaskRow(p.id,t,false)).join('')}`:``}
    ${done.length?`<div class="section-lbl" style="margin-top:16px;color:var(--ok)">COMPLETED (${done.length})</div>${done.map(t=>buildTaskRow(p.id,t,true)).join('')}`:''}
    ${!p.tasks.length?`<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-title">No tasks yet</div><div class="empty-body">Add a task above with an optional alarm time<br>and it'll buzz your phone when it's due.</div></div>`:''}
  </div>`;
}

function buildTaskRow(pid,t,done){
  const pr=PRIOS[t.prio]||PRIOS.normal;

  // Build alarm badge with live countdown
  let alarmBadge='';
  if(t.alarmTime&&!done){
    const diff=new Date(t.alarmTime)-Date.now();
    const countdown=fmtCountdown(t.alarmTime);
    const isUrgent=diff>0&&diff<300000;   // < 5 min
    const isOverdue=diff<=0;
    const isFired=t.alarmFired;
    let bg=isFired?'#0a2010':isOverdue?'#3a0a0a':isUrgent?'#3a2a08':'#2a1e08';
    let bc=isFired?'rgba(34,197,94,.4)':isOverdue?'rgba(239,68,68,.6)':isUrgent?'rgba(245,158,11,.7)':'rgba(245,158,11,.4)';
    let tc=isFired?'var(--ok)':isOverdue?'var(--danger)':isUrgent?'#fde68a':'var(--warn)';
    alarmBadge=`<div class="task-alarm-badge" data-alarm-iso="${isFired?'':t.alarmTime}" style="background:${bg};border-color:${bc};color:${tc};flex-direction:column;align-items:flex-start;gap:1px;padding:3px 8px">
      <div style="display:flex;gap:4px;align-items:center">
        <span>${isFired?'✓':'🔔'}</span>
        <span>${fmtAlarmTime(t.alarmTime)}</span>
      </div>
      ${isFired
        ?`<span style="font-size:9px;opacity:.7">Alarm fired</span>`
        :`<span class="countdown-live" style="font-size:9px;opacity:.85">${countdown}</span>`
      }
    </div>`;
  }

  if(done)return`<div class="task-done">
    <div class="task-cb-done" data-toggle="${t.id}" data-pid="${pid}" style="cursor:pointer">✓</div>
    <div class="task-text-done">${esc(t.text)}</div>
    <button class="btn-danger" data-deltask="${t.id}" data-pid="${pid}">✕</button>
  </div>`;

  return`<div class="task-row fade-up">
    <div class="task-cb" data-toggle="${t.id}" data-pid="${pid}" style="border-color:${pr.color};cursor:pointer"></div>
    <div style="flex:1">
      <div style="font-size:13px;color:var(--tx);line-height:1.5">${esc(t.text)}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap">
        <div style="font-size:10px;color:${pr.color};font-family:var(--f-mono)">${pr.label.toUpperCase()}</div>
        ${alarmBadge}
      </div>
    </div>
    <button class="btn-danger" data-deltask="${t.id}" data-pid="${pid}">✕</button>
  </div>`;
}

function buildReqDocs(p){
  const docs=p.reqDocs||[];
  const done=docs.filter(d=>d.done).length;
  const total=docs.length;
  const pct=total?Math.round((done/total)*100):0;
  // Group: pending first, done at bottom
  const pending=docs.filter(d=>!d.done);
  const completed=docs.filter(d=>d.done);

  return`<div class="page" style="padding-bottom:80px">
    <!-- Progress bar -->
    <div style="margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:var(--f-mono);font-size:10px;color:var(--mu);letter-spacing:.15em">DOCUMENTATION PROGRESS</span>
      <span style="font-family:var(--f-mono);font-size:11px;font-weight:700;color:${pct===100?'var(--ok)':'var(--ac)'}">${done}/${total} · ${pct}%</span>
    </div>
    <div class="rd-progress mb16"><div class="rd-progress-fill" style="width:${pct}%"></div></div>

    <!-- Add one-off item for this patient -->
    <div class="surf2 mb16">
      <div class="lbl" style="margin-bottom:8px">Add Item for This Patient</div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="rd-new-label" placeholder="e.g. Post-procedure check, PICC site assessment…" value="${esc(APP.newRdLabel)}" style="flex:1;font-size:13px"/>
        <button class="btn" id="rd-add-item" style="flex:none;padding:10px 14px;font-size:12px">＋</button>
      </div>
    </div>

    <!-- Pending items -->
    ${pending.length?`<div class="rd-section-hdr" style="color:var(--ac)">PENDING (${pending.length})</div>`:''}
    ${pending.map(d=>{
      const cat=CMAP[d.category]||CMAP['other'];
      return`<div class="rd-row" data-rdid="${d.id}" data-rdpid="${p.id}">
        <div class="rd-cb" data-rdtoggle="${d.id}" data-rdpid="${p.id}"></div>
        <div style="flex:1">
          <div class="rd-label">${esc(d.label)}</div>
          <div class="rd-meta">
            <span class="rd-freq">${esc(d.freq||'')}</span>
            <span style="font-size:10px;color:${cat.color};font-family:var(--f-mono)">${cat.icon} ${cat.label}</span>
          </div>
        </div>
        <button class="btn-danger" data-rddel="${d.id}" data-rdpid="${p.id}" style="flex-shrink:0">✕</button>
      </div>`;
    }).join('')}

    <!-- Completed items -->
    ${completed.length?`<div class="rd-section-hdr" style="color:var(--ok);margin-top:${pending.length?14:0}px">COMPLETED (${completed.length})</div>`:''}
    ${completed.map(d=>{
      return`<div class="rd-row done">
        <div class="rd-cb checked" data-rdtoggle="${d.id}" data-rdpid="${p.id}">
          <span style="color:#fff;font-size:13px;line-height:1">✓</span>
        </div>
        <div style="flex:1">
          <div class="rd-label">${esc(d.label)}</div>
          <div class="rd-meta">
            <span class="rd-freq">${esc(d.freq||'')}</span>
            ${d.time?`<span class="rd-time">✓ ${fmt(d.time)}</span>`:''}
          </div>
        </div>
        <button class="btn-danger" data-rddel="${d.id}" data-rdpid="${p.id}" style="flex-shrink:0">✕</button>
      </div>`;
    }).join('')}

    ${!docs.length?`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No required docs</div><div class="empty-body">Configure your unit's template from the board → ⚙ → Manage RD Templates</div></div>`:''}

    <!-- Manage templates link -->
    <div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;color:var(--mu)">Templates apply to new patients</span>
      <button class="btn-ghost" id="open-rd-manager" style="font-size:11px;color:var(--ac)">⚙ Manage Templates</button>
    </div>
  </div>
  ${buildRdManager()}`;

function buildPhrasePicker(){
  if(!APP.phraseOpen)return'';
  const q=APP.phraseSearch.toLowerCase();
  const phrases=allPhrases().filter(p=>!q||p.label.toLowerCase().includes(q)||p.trigger.includes(q)||p.text.toLowerCase().includes(q));
  // Group by category
  const byCat={};
  phrases.forEach(p=>{(byCat[p.category]=byCat[p.category]||[]).push(p);});
  return`<div class="overlay" id="phrase-overlay" style="z-index:300">
    <div class="sheet slide-up" style="max-height:96vh">
      <div class="row-between" style="margin-bottom:12px">
        <div>
          <div style="font-size:17px;font-weight:700;color:#edf6ff">📝 SmartPhrases</div>
          <div style="font-size:11px;color:var(--mu);margin-top:2px;font-family:var(--f-mono)">Tap to insert · Type . in log to auto-suggest</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn-ghost" id="open-phrase-manager" style="font-size:11px;color:var(--ac)">＋ Custom</button>
          <button class="btn-ghost" id="close-phrase-picker" style="font-size:16px;padding:4px 10px">✕</button>
        </div>
      </div>
      <input class="inp mb12" id="phrase-search" placeholder="Search phrases…" value="${esc(APP.phraseSearch)}" style="font-size:13px"/>

// ═══════════════════════════════════════════════════════
//  EVENT HANDLERS
// ═══════════════════════════════════════════════════════
function attachEvents(){
  const el=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const e=el(id);if(e)e.addEventListener(ev,fn);};

  // Setup
  on('s-name','input',e=>{APP.nurse.name=e.target.value;});
  on('s-shift','change',e=>{APP.nurse.shift=e.target.value;});
  on('s-unit','change',e=>{APP.nurse.unit=e.target.value;});
  on('s-start','click',()=>{APP.screen='chart';render();});

  // Note output
  on('note-back','click',()=>{APP.screen='chart';render();});
  on('note-copy','click',()=>{
    navigator.clipboard.writeText(APP.noteOut).then(()=>{
      const b=el('note-copy');if(b){b.textContent='✓ COPIED!';b.style.background='linear-gradient(135deg,#16a34a,#15803d)';setTimeout(()=>{if(el('note-copy')){el('note-copy').textContent='📋 COPY FOR EPIC';el('note-copy').style.background='';}},2500);}
    });
  });

  // Board
  on('back-board','click',()=>{APP.activeId=null;APP.tab='timeline';render();});
  on('go-setup','click',()=>{APP.screen='setup';render();});
  on('board-log-now','click',()=>openLog(null));
  on('board-search','input',e=>{APP.search=e.target.value;render();});
  on('add-pt-btn','click',()=>{APP.addingPt=true;render();});
  on('add-pt-cancel','click',()=>{APP.addingPt=false;render();});
  on('np-room','input',e=>{APP.newPtRoom=e.target.value;});
  on('np-name','input',e=>{APP.newPtName=e.target.value;});
  on('np-mrn','input',e=>{APP.newPtMrn=e.target.value;});
  on('np-dx','input',e=>{APP.newPtDx=e.target.value;});
  on('add-pt-save','click',()=>{
    if(!APP.newPtRoom&&!APP.newPtName)return;
    APP.pts.push({id:uid(),room:APP.newPtRoom,name:APP.newPtName,mrn:APP.newPtMrn,dx:APP.newPtDx,entries:[],tasks:[],brainImg:null,
      reqDocs:APP.rdTemplates.map(t=>({id:uid(),label:t.label,category:t.category||'assessment',freq:t.freq||'Each shift',required:t.required||false,done:false,time:null}))});
    APP.newPtRoom=APP.newPtName=APP.newPtMrn=APP.newPtDx='';APP.addingPt=false;render();
  });

  // Patient cards
  document.querySelectorAll('[data-ptid]').forEach(el=>{
    el.addEventListener('click',()=>{APP.activeId=el.dataset.ptid;APP.tab='timeline';render();});
  });

  // Patient detail
  on('remove-pt','click',()=>{APP.pts=APP.pts.filter(p=>p.id!==APP.activeId);APP.activeId=null;render();});
  document.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click',()=>{APP.tab=el.dataset.tab;render();});
  });
  on('pt-log-now','click',()=>openLog(APP.activeId));

  // Entry delete
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const pid=el.dataset.pid,eid=el.dataset.del;
      const p=APP.pts.find(p=>p.id===pid);
      if(p)p.entries=p.entries.filter(e=>e.id!==eid);
      render();
    });
  });

  // Epic note chips
  document.querySelectorAll('[data-notetype]').forEach(el=>{
    el.addEventListener('click',()=>{APP.noteModalPid=APP.activeId;APP.noteModalType=el.dataset.notetype;render();});
  });

  // Note modal
  on('note-modal-cancel','click',()=>{APP.noteModalPid=null;render();});
  on('note-modal-ovl','click',e=>{if(e.target.id==='note-modal-ovl'){APP.noteModalPid=null;render();}});
  document.querySelectorAll('[data-noteset]').forEach(el=>{
    el.addEventListener('click',()=>{APP.noteModalType=el.dataset.noteset;render();});
  });
  on('note-modal-go','click',()=>{
    const p=APP.pts.find(p=>p.id===APP.noteModalPid);
    if(!p)return;
    APP.noteOut=generateNote(p,EPIC_TYPES[APP.noteModalType],APP.nurse);
    APP.noteModalPid=null;APP.screen='note';render();
  });

  // Brain
  on('brain-cam','click',()=>el('brain-file-cam')?.click());
  on('brain-lib','click',()=>el('brain-file-lib')?.click());
  on('brain-recam','click',()=>el('brain-file-cam')?.click());
  ['brain-file-cam','brain-file-lib'].forEach(id=>{
    on(id,'change',e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{const p=pt();if(p){p.brainImg=ev.target.result;render();}};
      r.readAsDataURL(f);
    });
  });
  on('brain-clear','click',()=>{const p=pt();if(p){p.brainImg=null;delete APP.brainScale[p.id];render();}});
  on('brain-reset','click',()=>{const p=pt();if(p){APP.brainScale[p.id]=1;render();}});
  on('brain-zoomin','click',()=>{const p=pt();if(p){APP.brainScale[p.id]=Math.min(5,(APP.brainScale[p.id]||1)+.5);render();}});
  on('brain-zoomout','click',()=>{const p=pt();if(p){APP.brainScale[p.id]=Math.max(1,(APP.brainScale[p.id]||1)-.5);render();}});

  // Tasks
  on('task-input','input',e=>{APP.taskText=e.target.value;});
  on('task-alarm-inp','change',e=>{APP.taskAlarmTime=e.target.value;});
  on('enable-notif','click',async()=>{await requestNotifPermission();render();});
  document.querySelectorAll('[data-prio]').forEach(el=>{
    el.addEventListener('click',()=>{APP.taskPrio=el.dataset.prio;render();});
  });
  on('task-add','click',async()=>{
    if(!APP.taskText.trim())return;
    const p=pt();if(!p)return;
    // Build alarm ISO time if provided
    let alarmTime=null;
    if(APP.taskAlarmTime){
      const[h,m]=APP.taskAlarmTime.split(':');
      const d=new Date();d.setSeconds(0,0);
      d.setHours(parseInt(h),parseInt(m));
      // If time is in the past, push to next occurrence (next day for night shift)
      if(d<=new Date())d.setDate(d.getDate()+1);
      alarmTime=d.toISOString();
    }
    // Request permission if alarm set and not yet granted
    if(alarmTime&&Notification.permission==='default')await requestNotifPermission();
    const task={id:uid(),text:APP.taskText.trim(),prio:APP.taskPrio,done:false,alarmTime,alarmFired:false};
    p.tasks.push(task);
    if(alarmTime)scheduleAlarm(task,p.room);
    APP.taskText='';APP.taskAlarmTime='';render();
  });
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const p=APP.pts.find(p=>p.id===el.dataset.pid);
      const t=p?.tasks.find(t=>t.id===el.dataset.toggle);
      if(t){t.done=!t.done;if(t.done)cancelAlarm(t.id);}
      render();
    });
  });
  document.querySelectorAll('[data-deltask]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const p=APP.pts.find(p=>p.id===el.dataset.pid);
      if(p){cancelAlarm(el.dataset.deltask);p.tasks=p.tasks.filter(t=>t.id!==el.dataset.deltask);}
      render();
    });
  });

  // ── Required Documentation ────────────────────────────
  on('rd-new-label','input',e=>{APP.newRdLabel=e.target.value;});
  on('rd-new-required','change',e=>{APP.newRdRequired=e.target.checked;});
  on('rd-add-item','click',()=>{
    if(!APP.newRdLabel.trim())return;
    const p=pt();if(!p)return;
    p.reqDocs=p.reqDocs||[];
    p.reqDocs.push({id:uid(),label:APP.newRdLabel.trim(),category:'assessment',freq:'',required:APP.newRdRequired,done:false,time:null});
    APP.newRdLabel='';APP.newRdRequired=false;render();
  });
  // Toggle RD item done/undone
  document.querySelectorAll('[data-rdtoggle]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const p=APP.pts.find(p=>p.id===el.dataset.rdpid);
      if(!p)return;
      const doc=p.reqDocs?.find(d=>d.id===el.dataset.rdtoggle);
      if(doc){doc.done=!doc.done;doc.time=doc.done?new Date().toISOString():null;}
      render();
    });
  });
  // Delete RD item
  document.querySelectorAll('[data-rddel]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const p=APP.pts.find(p=>p.id===el.dataset.rdpid);
      if(p)p.reqDocs=p.reqDocs?.filter(d=>d.id!==el.dataset.rddel);
      render();
    });
  });
  // Open/close RD template manager
  on('open-rd-manager','click',()=>{APP.rdManagerOpen=true;render();});
  on('close-rd-manager','click',()=>{APP.rdManagerOpen=false;render();});
  on('rd-manager-overlay','click',e=>{if(e.target.id==='rd-manager-overlay'){APP.rdManagerOpen=false;render();}});
  // Template manager form
  on('rdt-new-label','input',e=>{APP.newRdLabel=e.target.value;});
  on('rdt-new-freq','input',e=>{APP.newRdFreq=e.target.value;});
  on('rdt-new-cat','change',e=>{APP.newRdCategory=e.target.value;});
  on('rdt-save','click',()=>{
    if(!APP.newRdLabel.trim())return;
    APP.rdTemplates=[...(APP.rdTemplates||[]),{id:uid(),label:APP.newRdLabel.trim(),category:APP.newRdCategory||'assessment',freq:APP.newRdFreq||'Each shift',required:false}];
    APP.newRdLabel='';APP.newRdFreq='Each shift';render();
  });
  document.querySelectorAll('[data-del-rdt]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      APP.rdTemplates=(APP.rdTemplates||[]).filter(t=>t.id!==el.dataset.delRdt);
      render();
    });
  });
  on('rdt-reset','click',()=>{APP.rdTemplates=DEFAULT_RD_TEMPLATES.map(t=>({...t}));render();});

  // Log Now modal
  on('log-close','click',closeLog);
  on('log-overlay','click',e=>{if(e.target.id==='log-overlay')closeLog();});
  on('log-ta','input',e=>{
    APP.logText=e.target.value;
    // Dot-phrase detection — update button state inline, only re-render if suggestions changed
    const{word,suggestions}=detectDotPhrase(APP.logText);
    const prevCount=(APP.logPhraseSuggestions||[]).length;
    APP.logDotWord=word;
    APP.logPhraseSuggestions=suggestions;
    // Enable/disable Process button in-place without full re-render
    const btn=document.getElementById('log-process');
    if(btn)btn.disabled=!APP.logText.trim();
    // Only re-render when suggestion count changes (new suggestions appeared/disappeared)
    if(suggestions.length!==prevCount)render();
  });
  on('toggle-edit-time','click',()=>{APP.editTime=!APP.editTime;render();});
  on('log-time-inp','change',e=>{APP.logTime=e.target.value;});
  on('mic-toggle','click',()=>{APP.logRec?REC.stop():REC.start();});
  on('log-process','click',processLog);
  on('log-back','click',()=>{APP.logResult=null;render();});
  on('log-commit','click',commitLog);
  on('toggle-cat','click',()=>{APP.logShowCat=!APP.logShowCat;render();});
  on('change-room','click',()=>{APP.logShowRoom=true;render();});
  on('pick-room','click',()=>{APP.logShowRoom=true;render();});
  on('cancel-room-pick','click',()=>{APP.logShowRoom=false;render();});
  document.querySelectorAll('[data-catid]').forEach(el=>{
    el.addEventListener('click',()=>{APP.logOverrideCat=el.dataset.catid;APP.logShowCat=false;render();});
  });
  document.querySelectorAll('[data-pickroom]').forEach(el=>{
    el.addEventListener('click',()=>{APP.logOverrideRoom=el.dataset.pickroom;APP.logShowRoom=false;render();});
  });

  // SmartPhrases
  on('open-phrase-picker','click',()=>{APP.phraseOpen=true;APP.phraseSearch='';render();});
  on('board-open-phrases','click',()=>{APP.phraseOpen=true;APP.phraseSearch='';APP.logOpen=true;APP.logCapTime=new Date().toISOString();APP.logText='';APP.logInterim='';APP.logResult=null;APP.logPhraseSuggestions=[];render();});
  on('close-phrase-picker','click',()=>{APP.phraseOpen=false;render();});
  on('phrase-overlay','click',e=>{if(e.target.id==='phrase-overlay'){APP.phraseOpen=false;render();}});
  on('phrase-search','input',e=>{APP.phraseSearch=e.target.value;render();});
  on('open-phrase-manager','click',()=>{APP.phraseManagerOpen=true;render();});
  on('close-phrase-manager','click',()=>{APP.phraseManagerOpen=false;render();});
  on('phrase-manager-overlay','click',e=>{if(e.target.id==='phrase-manager-overlay'){APP.phraseManagerOpen=false;render();}});
  on('new-phrase-trigger','input',e=>{APP.newPhraseTrigger=e.target.value;});
  on('new-phrase-label','input',e=>{APP.newPhraseLabel=e.target.value;});
  on('new-phrase-text','input',e=>{APP.newPhraseText=e.target.value;});
  on('new-phrase-cat','change',e=>{APP.newPhraseCat=e.target.value;});
  on('save-custom-phrase','click',()=>{
    let trigger=APP.newPhraseTrigger.trim();
    if(!trigger||!APP.newPhraseText.trim())return;
    if(!trigger.startsWith('.'))trigger='.'+trigger;
    APP.customPhrases=[...(APP.customPhrases||[]),{id:uid(),trigger:trigger.toLowerCase(),label:APP.newPhraseLabel||trigger,category:APP.newPhraseCat,text:APP.newPhraseText.trim()}];
    APP.newPhraseTrigger='';APP.newPhraseLabel='';APP.newPhraseText='';APP.newPhraseCat='assessment';
    render();
  });
  document.querySelectorAll('[data-del-phrase]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      APP.customPhrases=(APP.customPhrases||[]).filter(p=>p.id!==el.dataset.delPhrase);
      render();
    });
  });
  // Insert phrase (from picker or inline suggestions)
  document.querySelectorAll('[data-insert-phrase]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const ph=allPhrases().find(p=>p.id===el.dataset.insertPhrase);
      if(ph)insertPhrase(ph);
    });
  });
}

// ═══════════════════════════════════════════════════════
//  LOG NOW LOGIC
// ═══════════════════════════════════════════════════════
function openLog(preRoomPid){
  APP.logOpen=true;
  APP.logCapTime=new Date().toISOString();
  APP.logText='';APP.logInterim='';APP.logTime='';
  APP.logResult=null;APP.logOverrideCat=null;APP.logOverrideRoom=null;
  APP.logShowCat=false;APP.logShowRoom=false;APP.logRec=false;APP.editTime=false;
  // Pre-set room if opening from patient detail
  if(preRoomPid){
    const p=APP.pts.find(p=>p.id===preRoomPid);
    if(p)APP._preRoomId=preRoomPid;
  } else {APP._preRoomId=null;}
  render();
}
function closeLog(){
  // Stop recognition internals without triggering REC.stop()'s render()
  REC._going = false;
  if (REC._inst) { try { REC._inst.stop(); } catch(e) {} REC._inst = null; }
  APP.logRec = false;
  APP.logInterim = '';
  APP.logOpen = false;
  render();
}
// startRec / stopRec are now handled by the REC object above

function processLog(){
  // Flush any interim speech into the text before processing
  if (APP.logInterim && APP.logInterim.trim()) {
    APP.logText = ((APP.logText||'') + ' ' + APP.logInterim).trim();
    APP.logInterim = '';
  }
  const raw = APP.logText.trim();
  if (!raw) return;
  // Stop recognition (without re-rendering mid-flight)
  REC._going = false;
  if (REC._inst) { try { REC._inst.stop(); } catch(e) {} REC._inst = null; }
  APP.logRec = false;
  // Classify
  const detectedRoom=extractRoom(raw);
  const cleanBase=stripRoom(raw);
  const category=classify(cleanBase);
  const cleanedText=polish(cleanBase);
  let patientId=APP._preRoomId||null;
  if(!patientId){
    const rm=detectedRoom;
    if(rm){const match=APP.pts.find(p=>p.room.toUpperCase()===rm.toUpperCase());if(match)patientId=match.id;}
  }
  let time=APP.logCapTime;
  if(APP.logTime){const[h,m]=APP.logTime.split(':');const d=new Date();d.setHours(+h,+m,0,0);time=d.toISOString();}
  APP.logResult={category,cleanedText,roomNum:detectedRoom,patientId,time};
  APP.logOverrideCat=null;APP.logOverrideRoom=null;APP.logShowCat=false;APP.logShowRoom=false;
  render();
}

function commitLog(){
  const r=APP.logResult;if(!r)return;
  const finalCat=APP.logOverrideCat||r.category;
  const finalPid=APP.logOverrideRoom||r.patientId;
  const entry={id:uid(),category:finalCat,text:r.cleanedText,time:r.time};
  if(finalPid){
    const p=APP.pts.find(p=>p.id===finalPid);
    if(p){p.entries.push(entry);}
  } else {
    // Create new patient shell
    const newPt={id:uid(),room:r.roomNum||'?',name:'',mrn:'',dx:'',entries:[entry],tasks:[],brainImg:null,
      reqDocs:APP.rdTemplates.map(t=>({id:uid(),label:t.label,category:t.category||'assessment',freq:t.freq||'Each shift',required:t.required||false,done:false,time:null}))};
    APP.pts.push(newPt);
  }
  closeLog();
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
rescheduleAllAlarms();
startTicker();
render();
</script>
